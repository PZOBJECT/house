      <stop offset="0%" stop-color="#4aabff"/>
      <stop offset="100%" stop-color="#409eff"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#cce6ff"/>
