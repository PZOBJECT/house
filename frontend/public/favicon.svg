  <line x1="76.28799999999998" y1="304.384" x2="150.016" y2="304.384" stroke="#409eff" stroke-width="4.1472"/>

  <!-- right window -->
  <rect x="361.98400000000004" y="267.52" width="73.72800000000001" height="73.72800000000001" rx="9.216000000000001" fill="white" stroke="#409eff" stroke-width="4.6080000000000005"/>
  <line x1="398.848" y1="267.52" x2="398.848" y2="341.248" stroke="#409eff" stroke-width="4.1472"/>
  <line x1="361.98400000000004" y1="304.384" x2="435.712" y2="304.384" stroke="#409eff" stroke-width="4.1472"/>

