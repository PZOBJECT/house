<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度账单 — House 出租房管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#409eff;--primary-dark:#337ecc;
  --success:#67c23a;--danger:#f56c6c;--warning:#e6a23c;
  --text:#303133;--text2:#606266;--text3:#909399;
  --bg:#f0f2f5;--card-bg:#fff;
  --radius:14px;--shadow:0 1px 4px rgba(0,0,0,.04);
  --font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.top-bar h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.top-bar h1 svg{color:var(--primary);width:24px;height:24px}

/* 标题区带徽章 */
.title-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.title-row h2{font-size:18px;font-weight:700;color:var(--text)}
.badges{display:flex;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 12px 3px 10px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.3px}
.badge-paid{background:linear-gradient(135deg,#f0f9eb,#e8f5e0);color:var(--success);border:1px solid #c8e6b5;box-shadow:0 1px 3px rgba(103,194,58,.15)}
.badge-unpaid{background:linear-gradient(135deg,#fef0f0,#fde8e8);color:var(--danger);border:1px solid #fbc4c4;box-shadow:0 1px 3px rgba(245,108,108,.15)}
.badge-num{font-size:16px;font-weight:800;line-height:1}
.badge-text{font-size:12px;font-weight:500}

/* 筛选栏 */
.filter-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.filter-left{display:flex;align-items:center;gap:8px;background:#f5f7fa;border-radius:10px;padding:5px 10px;flex-shrink:0}
.filter-left select{padding:5px 10px;border-radius:8px;border:1px solid #e0e4ea;font-size:14px;font-weight:500;color:var(--text);background:var(--card-bg);outline:none;cursor:pointer;transition:border-color .2s}
.filter-left select:hover{border-color:var(--primary)}
.filter-left select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(64,158,255,.2)}
.btn-primary{padding:6px 16px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:var(--primary-dark)}

/* 统计栏 */
.stats-row{display:flex;align-items:center;gap:20px;background:#f5f7fa;border-radius:10px;padding:8px 16px;margin-bottom:10px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px}
.stat-num{font-size:16px;font-weight:800;color:var(--text)}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);margin-right:2px}
.stat-pipe{width:1px;height:20px;background:#e0e4ea;flex-shrink:0}

/* 楼层筛选按钮 */
.floor-row{display:flex;gap:10px;margin-bottom:14px}
.floor-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:#f5f7fa;border:2px solid transparent;cursor:pointer;font-size:14px;font-weight:600;color:var(--text2);transition:all .2s}
.floor-btn:hover{background:#ecf5ff;border-color:#b3d8ff}
.floor-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(64,158,255,.3)}
.floor-badge{display:inline-block;font-size:11px;padding:0 6px;height:18px;line-height:18px;border-radius:4px;font-weight:600}
.fb-1{background:#e8f5e9;color:#2e7d32}
.fb-2{background:#fff3e0;color:#e65100}
.fb-3{background:#e3f2fd;color:#1565c0}
.fb-active{background:rgba(255,255,255,.2);color:#fff}

/* 卡片 */
.card{background:var(--card-bg);border-radius:var(--radius);border:1px solid #ebeef5;box-shadow:var(--shadow);overflow:hidden}

/* 表格 */
.th-row{display:grid;grid-template-columns:40px 1.2fr .8fr .8fr .8fr .8fr .8fr .8fr 1fr 90px;padding:10px 14px;background:#f5f7fa;font-size:12px;font-weight:600;color:var(--text3);border-bottom:1px solid #ebeef5}
.tr-row{display:grid;grid-template-columns:40px 1.2fr .8fr .8fr .8fr .8fr .8fr .8fr 1fr 90px;padding:0 14px;align-items:center;border-bottom:1px solid #f5f7fa;height:48px;font-size:14px;transition:background .15s}
.tr-row:hover{background:#f5f7fa}
.tr-row:last-child{border-bottom:none}
.tr-row.paid{background:#f4f4f5;color:var(--text3)}
.tr-row.paid .cell-room{color:var(--text3)}
.cell-room{font-weight:700;color:var(--text)}
.cell-input{padding:4px 6px;border:1px solid #e0e4ea;border-radius:8px;width:70px;text-align:center;font-size:14px;outline:none;transition:border-color .2s}
.cell-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(64,158,255,.2)}
.cell-cost{font-weight:700;color:var(--warning)}
.cell-green{font-weight:600;color:var(--success)}
.cell-red{font-weight:600;color:var(--danger)}
.btn-sm{padding:4px 10px;border-radius:6px;border:1px solid var(--primary);background:#fff;color:var(--primary);font-size:12px;cursor:pointer;transition:all .2s}
.btn-sm:hover{background:var(--primary);color:#fff}
.btn-sm.disabled{border-color:#d0d0d0;color:#c0c4cc;cursor:not-allowed}

/* 下拉选择 */
select{padding:5px 10px;border-radius:8px;border:1px solid #e0e4ea;font-size:14px;font-weight:500;color:var(--text);background:var(--card-bg);outline:none;cursor:pointer}
select:hover{border-color:var(--primary)}
</style>
</head>
<body>
<div class="top-bar">
  <h1>
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" fill="currentColor"/></svg>
    月度账单
  </h1>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
  <div class="filter-left">
    <select><option>2026</option></select>
    <select><option>06月</option></select>
    <select><option>全部状态</option><option>已缴费</option><option>未缴费</option></select>
    <select><option>全部房间</option></select>
    <button class="btn-primary">查询</button>
  </div>
  <div>
    <button class="btn-primary" style="background:var(--success)">生成当月账单</button>
  </div>
</div>

<!-- 统计栏 -->
<div class="title-row">
  <h2>2楼 · 当前账单</h2>
  <div class="badges">
    <span class="badge badge-paid"><span class="badge-num">8</span><span class="badge-text">已缴费</span></span>
    <span class="badge badge-unpaid"><span class="badge-num">4</span><span class="badge-text">未缴费</span></span>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><span class="stat-label">用电量</span><span class="stat-num">480.5<span style="font-size:12px;font-weight:500;color:var(--text3)">度</span></span></div>
  <div class="stat-pipe"></div>
  <div class="stat"><span class="stat-label">用水量</span><span class="stat-num">38<span style="font-size:12px;font-weight:500;color:var(--text3)">吨</span></span></div>
  <div class="stat-pipe"></div>
  <div class="stat"><span class="stat-label">总费用</span><span class="stat-num" style="color:var(--warning)">15,320<span style="font-size:12px;font-weight:500;color:var(--text3)">元</span></span></div>
  <div class="stat-pipe"></div>
  <div class="stat"><span class="stat-label">已收</span><span class="stat-num" style="color:var(--success)">10,240<span style="font-size:12px;font-weight:500;color:var(--text3)">元</span></span></div>
  <div class="stat-pipe"></div>
  <div class="stat"><span class="stat-label">未收</span><span class="stat-num" style="color:var(--danger)">5,080<span style="font-size:12px;font-weight:500;color:var(--text3)">元</span></span></div>
</div>

<!-- 楼层筛选 -->
<div class="floor-row">
  <div class="floor-btn">全部</div>
  <div class="floor-btn active"><span class="floor-badge fb-1">1F</span> 1楼</div>
  <div class="floor-btn"><span class="floor-badge fb-2">2F</span> 2楼</div>
  <div class="floor-btn"><span class="floor-badge fb-3">3F</span> 3楼</div>
</div>

<!-- 表格 -->
<div class="card">
  <div class="th-row">
    <span></span><span>房间</span><span>电表底数</span><span>本月读数</span><span>电费</span><span>水表底数</span><span>本月读数</span><span>水费</span><span>总费用</span><span>操作</span>
  </div>

  <!-- 未缴费 — 可编辑 -->
  <div class="tr-row">
    <span><span class="floor-badge fb-1" style="font-size:10px;padding:0 5px">1F</span></span>
    <span class="cell-room">101</span>
    <span><input class="cell-input" value="1,280"></span>
    <span><input class="cell-input" value="1,420"></span>
    <span class="cell-cost">140</span>
    <span><input class="cell-input" value="86"></span>
    <span><input class="cell-input" value="92"></span>
    <span class="cell-cost">30</span>
    <span class="cell-cost">1,370</span>
    <span><button class="btn-sm">标记缴费</button></span>
  </div>

  <div class="tr-row">
    <span><span class="floor-badge fb-1" style="font-size:10px;padding:0 5px">1F</span></span>
    <span class="cell-room">102</span>
    <span><input class="cell-input" value="950"></span>
    <span><input class="cell-input" value="1,080"></span>
    <span class="cell-cost">130</span>
    <span><input class="cell-input" value="42"></span>
    <span><input class="cell-input" value="48"></span>
    <span class="cell-cost">30</span>
    <span class="cell-cost">1,360</span>
    <span><button class="btn-sm">标记缴费</button></span>
  </div>

  <div class="tr-row">
    <span><span class="floor-badge fb-1" style="font-size:10px;padding:0 5px">1F</span></span>
    <span class="cell-room">103</span>
    <span><input class="cell-input" value="2,150"></span>
    <span><input class="cell-input" value="2,300"></span>
    <span class="cell-cost">150</span>
    <span><input class="cell-input" value="65"></span>
    <span><input class="cell-input" value="70"></span>
    <span class="cell-cost">25</span>
    <span class="cell-cost">1,375</span>
    <span><button class="btn-sm">标记缴费</button></span>
  </div>

  <div class="tr-row">
    <span><span class="floor-badge fb-1" style="font-size:10px;padding:0 5px">1F</span></span>
    <span class="cell-room">104</span>
    <span><input class="cell-input" value="1,680"></span>
    <span><input class="cell-input" value="1,790"></span>
    <span class="cell-cost">110</span>
    <span><input class="cell-input" value="34"></span>
    <span><input class="cell-input" value="40"></span>
    <span class="cell-cost">30</span>
    <span class="cell-cost">1,340</span>
    <span><button class="btn-sm">标记缴费</button></span>
  </div>

  <!-- 已缴费 — 置灰不可编辑 -->
  <div class="tr-row paid">
    <span><span class="floor-badge fb-1" style="font-size:10px;padding:0 5px">1F</span></span>
    <span class="cell-room">105</span>
    <span><span>2,010</span></span>
    <span><span>2,140</span></span>
    <span class="cell-green">130</span>
    <span><span>55</span></span>
    <span><span>61</span></span>
    <span class="cell-green">30</span>
    <span style="color:var(--success);font-weight:700">1,360</span>
    <span><span class="cell-green" style="font-size:12px">✓ 已缴</span></span>
  </div>

  <div class="tr-row paid">
    <span><span class="floor-badge fb-1" style="font-size:10px;padding:0 5px">1F</span></span>
    <span class="cell-room">106</span>
    <span><span>3,250</span></span>
    <span><span>3,390</span></span>
    <span class="cell-green">140</span>
    <span><span>78</span></span>
    <span><span>84</span></span>
    <span class="cell-green">30</span>
    <span style="color:var(--success);font-weight:700">1,370</span>
    <span><span class="cell-green" style="font-size:12px">✓ 已缴</span></span>
  </div>
</div>
</body>
</html>
