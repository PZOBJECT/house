<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据大屏 — House 出租房管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--el-color-white:#fff;--el-color-black:#000;--el-color-primary:#409eff;--el-color-primary-light-3:#79bbff;--el-color-primary-light-5:#a0cfff;--el-color-primary-light-7:#c6e2ff;--el-color-primary-light-8:#d9ecff;--el-color-primary-light-9:#ecf5ff;--el-color-primary-dark-2:#337ecc;--el-color-success:#67c23a;--el-color-success-light-3:#95d475;--el-color-success-light-5:#b3e19d;--el-color-success-light-7:#d1edc4;--el-color-success-light-8:#e1f3d8;--el-color-success-light-9:#f0f9eb;--el-color-success-dark-2:#529b2e;--el-color-warning:#e6a23c;--el-color-warning-light-3:#eebe77;--el-color-warning-light-5:#f3d19e;--el-color-warning-light-7:#f8e3c5;--el-color-warning-light-8:#faecd8;--el-color-warning-light-9:#fdf6ec;--el-color-danger:#f56c6c;--el-color-danger-light-3:#f89898;--el-color-danger-light-5:#fab6b6;--el-color-danger-light-7:#fcd3d3;--el-color-danger-light-8:#fde2e2;--el-color-danger-light-9:#fef0f0;--el-color-info:#909399;--el-bg-color:#fff;--el-bg-color-page:#f2f3f5;--el-text-color-primary:#303133;--el-text-color-regular:#606266;--el-text-color-secondary:#909399;--el-border-color:#dcdfe6;--el-border-color-light:#e4e7ed;--el-border-color-lighter:#ebeef5;--el-fill-color:#f0f2f5;--el-fill-color-light:#f5f7fa;--el-border-radius-base:4px;--el-font-family:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",Arial,sans-serif;--el-font-size-base:14px}
body{font-family:var(--el-font-family);background:var(--el-bg-color-page);color:var(--el-text-color-primary);padding:20px;min-height:100vh}
/* Exact real CSS from Vue component */
.dashboard{display:flex;flex-direction:column;gap:16px;height:calc(100vh - 24px);overflow-y:auto;padding:2px 0}
.dash-header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.dash-title{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:#303133}
.dash-title svg{color:#409eff;width:24px;height:24px}
.dash-time{font-size:13px;color:#909399;font-weight:500}
.kpi-row{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:14px;flex-shrink:0}
.kpi-card{display:flex;align-items:center;gap:14px;padding:18px 20px;border-radius:14px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.card-income{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.card-paid{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:#fff}
.card-unpaid{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:#fff}
.card-occupancy{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);color:#fff}
.kpi-icon-wrap{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.2);flex-shrink:0}
.kpi-body{display:flex;flex-direction:column;gap:2px;min-width:0}
.kpi-label{font-size:13px;font-weight:500;opacity:.85;letter-spacing:.3px}
.kpi-value{font-size:26px;font-weight:800;line-height:1.2}
.kpi-unit{font-size:14px;font-weight:500;opacity:.7;margin-left:3px}
.kpi-trend{position:absolute;right:16px;bottom:12px;font-size:12px;opacity:.8}
.kpi-hint{position:absolute;right:16px;bottom:12px;font-size:12px;font-weight:600;opacity:.7;background:rgba(0,0,0,.15);padding:2px 10px;border-radius:10px}
.kpi-progress{position:absolute;right:16px;bottom:12px;display:flex;align-items:center;gap:6px}
.progress-track{width:60px;height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s}
.progress-green,.progress-blue{background:#fff}
.progress-text{font-size:12px;font-weight:700;opacity:.9}
.detail-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;flex-shrink:0}
.detail-card{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #ebeef5;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .2s,box-shadow .2s}
.detail-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.detail-card-header{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;padding-bottom:14px;border-bottom:1px solid #f0f2f5;margin-bottom:14px}
.card-elec .detail-card-header{color:#e6a23c}
.card-elec{background:linear-gradient(135deg,#fffbf0,#fff8e1)}
.card-water .detail-card-header{color:#409eff}
.card-water{background:linear-gradient(135deg,#f0f9ff,#e6f4ff)}
.card-rent .detail-card-header{color:#67c23a}
.card-rent{background:linear-gradient(135deg,#f0faf0,#e8f5e0)}
.detail-card-body{display:flex;align-items:center;gap:0}
.detail-metric{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.dm-label{font-size:12px;color:#909399;font-weight:500}
.dm-value{font-size:24px;font-weight:800;color:#303133}
.dm-unit{font-size:13px;font-weight:500;color:#909399;margin-left:2px}
.dm-money{color:#e6a23c}
.detail-divider{width:1px;height:40px;background:#ebeef5;flex-shrink:0}
</style>
</head>
<body>
<div class="dashboard">
  <div class="dash-header">
    <div class="dash-title">
      <svg viewBox="0 0 24 24"><path d="M19 9.3V4h-3v2.6L12 3 2 12h3v8h5v-6h4v6h5v-8h3l-3-2.7z" fill="currentColor"/></svg>
      <span>2026年06月 数据概览</span>
    </div>
    <div class="dash-time">2026年6月10日 15:57</div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card card-income">
      <div class="kpi-icon-wrap">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z" fill="currentColor"/></svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-label">当月总收入</span>
        <span class="kpi-value">0.00<span class="kpi-unit">元</span></span>
      </div>
      <div class="kpi-trend">较上月 <span class="trend-up">—</span></div>
    </div>
    <div class="kpi-card card-paid">
      <div class="kpi-icon-wrap">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/></svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-label">已缴费</span>
        <span class="kpi-value">0<span class="kpi-unit">/0间</span></span>
      </div>
      <div class="kpi-progress">
        <div class="progress-track"><div class="progress-fill progress-green" style="width:0%"></div></div>
        <span class="progress-text">0%</span>
      </div>
    </div>
    <div class="kpi-card card-unpaid" style="cursor:pointer">
      <div class="kpi-icon-wrap">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" fill="currentColor"/></svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-label">未缴费 — 点击查看</span>
        <span class="kpi-value">0<span class="kpi-unit">间</span></span>
      </div>
      <div class="kpi-hint">待催收</div>
    </div>
    <div class="kpi-card card-occupancy">
      <div class="kpi-icon-wrap">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/></svg>
      </div>
      <div class="kpi-body">
        <span class="kpi-label">出租率</span>
        <span class="kpi-value">0<span class="kpi-unit">/0间</span></span>
      </div>
      <div class="kpi-progress">
        <div class="progress-track"><div class="progress-fill progress-blue" style="width:0%"></div></div>
        <span class="progress-text">0%</span>
      </div>
    </div>
  </div>

  <div class="detail-row">
    <div class="detail-card card-elec">
      <div class="detail-card-header">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M13.5 2L4.2 13.5h5.3L10 22l9.3-11.5H14L13.5 2z" fill="currentColor"/></svg>
        <span>电费</span>
      </div>
      <div class="detail-card-body">
        <div class="detail-metric"><span class="dm-label">用量</span><span class="dm-value">0.0<span class="dm-unit">度</span></span></div>
        <div class="detail-divider"></div>
        <div class="detail-metric"><span class="dm-label">收入</span><span class="dm-value dm-money">0.00<span class="dm-unit">元</span></span></div>
      </div>
    </div>
    <div class="detail-card card-water">
      <div class="detail-card-header">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8z" fill="currentColor"/></svg>
        <span>水费</span>
      </div>
      <div class="detail-card-body">
        <div class="detail-metric"><span class="dm-label">用量</span><span class="dm-value">0.0<span class="dm-unit">吨</span></span></div>
        <div class="detail-divider"></div>
        <div class="detail-metric"><span class="dm-label">收入</span><span class="dm-value dm-money">0.00<span class="dm-unit">元</span></span></div>
      </div>
    </div>
    <div class="detail-card card-rent">
      <div class="detail-card-header">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" fill="currentColor"/></svg>
        <span>房租</span>
      </div>
      <div class="detail-card-body">
        <div class="detail-metric"><span class="dm-label">房间数</span><span class="dm-value">0<span class="dm-unit">间</span></span></div>
        <div class="detail-divider"></div>
        <div class="detail-metric"><span class="dm-label">收入</span><span class="dm-value dm-money">0.00<span class="dm-unit">元</span></span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
