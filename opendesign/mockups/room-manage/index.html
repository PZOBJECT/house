<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房间管理 — House 出租房管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--el-color-white:#fff;--el-color-black:#000;--el-color-primary:#409eff;--el-color-success:#67c23a;--el-color-warning:#e6a23c;--el-color-danger:#f56c6c;--el-color-info:#909399;--el-bg-color:#fff;--el-bg-color-page:#f2f3f5;--el-text-color-primary:#303133;--el-text-color-regular:#606266;--el-text-color-secondary:#909399;--el-border-color:#dcdfe6;--el-border-color-lighter:#ebeef5;--el-border-radius-base:4px;--el-font-family:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",Arial,sans-serif}
body{font-family:var(--el-font-family);background:var(--el-bg-color-page);color:var(--el-text-color-primary);padding:20px;min-height:100vh}
/* Exact real CSS from rendered RoomManage component */
.room-manage{display:flex;flex-direction:column;height:calc(100vh - 24px);padding:0 2px}
.page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:10px;flex-shrink:0}
.page-header h2{margin:0;font-size:20px;color:#303133}
.header-actions{display:flex;gap:12px;align-items:center}
.stats-bar{display:flex;align-items:center;gap:0;margin-bottom:10px;flex-shrink:0;background:linear-gradient(135deg,#f8f9fc 0%,#f0f4ff 100%);border-radius:12px;padding:12px 18px;border:1px solid #e4e9f2;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-item{display:flex;align-items:center;gap:10px;flex:1;min-width:0;padding:0 4px}
.stat-icon{flex-shrink:0;width:20px;height:20px}
.stat-body{display:flex;flex-direction:column;gap:1px;min-width:0}
.stat-label{font-size:11px;font-weight:500;letter-spacing:.3px;line-height:1.2}
.stat-value{font-size:20px;font-weight:800;line-height:1.2}
.stat-unit{font-size:12px;font-weight:500;margin-left:2px;opacity:.7}
.stat-total .stat-icon{color:#606266}
.stat-total .stat-label{color:#909399}
.stat-total .stat-value{color:#303133}
.stat-rented .stat-icon,.stat-rented .stat-label,.stat-rented .stat-value{color:#67c23a}
.stat-unrented .stat-icon,.stat-unrented .stat-label,.stat-unrented .stat-value{color:#e6a23c}
.stat-rate .stat-icon,.stat-rate .stat-label,.stat-rate .stat-value{color:#409eff}
.stat-divider{width:1px;height:40px;background:#e0e4ea;margin:0 8px;flex-shrink:0}
.floor-filter{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-shrink:0}
.floor-label{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:#edf2f7;border-radius:8px;font-size:14px;font-weight:600;color:#4a5568;white-space:nowrap;letter-spacing:.5px}
.floor-icon{flex-shrink:0;opacity:.8}
.floor-buttons{display:flex;gap:10px}
.floor-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:88px;height:56px;border-radius:10px;cursor:pointer;transition:.2s;user-select:none;background:#f5f7fa;border:2px solid transparent;color:#606266}
.floor-card:hover{background:#ecf5ff;border-color:#b3d8ff;transform:translateY(-1px);box-shadow:0 2px 8px rgba(64,158,255,.12)}
.floor-card.active{background:#409eff;border-color:#409eff;color:#fff;box-shadow:0 3px 10px rgba(64,158,255,.3);transform:translateY(-1px)}
.floor-num{font-size:17px;font-weight:700;line-height:1.2}
.floor-desc{font-size:11px;opacity:.75;line-height:1.2}
.floor-card.active .floor-desc{opacity:.9}
.floor-check{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#67c23a;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(103,194,58,.4)}
.table-wrapper{flex:1;min-height:0;overflow:hidden}
.table-wrapper .el-table__row{height:52px}
.table-wrapper .el-table__row td{padding:6px 0}
.cell-room{font-size:18px;font-weight:700;color:#303133;letter-spacing:1px}
.cell-value{font-size:17px;font-weight:600;color:#409eff}
</style>
</head>
<body>
<div class="room-manage">
  <div class="page-header">
    <h2>房间管理</h2>
    <div class="header-actions">
      <div style="display:flex;gap:0;border:1px solid #dcdfe6;border-radius:4px;overflow:hidden">
        <span style="padding:8px 20px;font-size:14px;background:#409eff;color:#fff;cursor:pointer">全部</span>
        <span style="padding:8px 20px;font-size:14px;color:#606266;cursor:pointer">已租</span>
        <span style="padding:8px 20px;font-size:14px;color:#606266;cursor:pointer">未租</span>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item stat-total">
      <svg class="stat-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      <div class="stat-body"><span class="stat-label">总房间</span><span class="stat-value">36<span class="stat-unit">间</span></span></div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item stat-rented">
      <svg class="stat-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      <div class="stat-body"><span class="stat-label">已租</span><span class="stat-value">0<span class="stat-unit">间</span></span></div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item stat-unrented">
      <svg class="stat-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      <div class="stat-body"><span class="stat-label">未租</span><span class="stat-value">0<span class="stat-unit">间</span></span></div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item stat-rate">
      <svg class="stat-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <div class="stat-body"><span class="stat-label">出租率</span><span class="stat-value">0<span class="stat-unit">%</span></span></div>
    </div>
  </div>

  <div class="floor-filter">
    <span class="floor-label">
      <svg class="floor-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      楼层
    </span>
    <div class="floor-buttons">
      <div class="floor-card"><span class="floor-num">全部</span><span class="floor-desc">2-5楼</span></div>
      <div class="floor-card active"><span class="floor-num">2楼</span><span class="floor-desc">201-209</span><span class="floor-check">✓</span></div>
      <div class="floor-card"><span class="floor-num">3楼</span><span class="floor-desc">301-309</span></div>
      <div class="floor-card"><span class="floor-num">4楼</span><span class="floor-desc">401-409</span></div>
      <div class="floor-card"><span class="floor-num">5楼</span><span class="floor-desc">501-509</span></div>
    </div>
  </div>

  <div class="table-wrapper">
    <table style="width:100%;border-collapse:collapse;border:1px solid var(--el-border-color);border-radius:8px;overflow:hidden">
      <thead>
        <tr style="background:#f5f7fa;color:#909399;font-size:13px;font-weight:500">
          <th style="padding:12px 8px;text-align:left;border-bottom:1px solid #ebeef5">房间号</th>
          <th style="padding:12px 8px;text-align:left;border-bottom:1px solid #ebeef5">月租金（元）</th>
          <th style="padding:12px 8px;text-align:left;border-bottom:1px solid #ebeef5">电费单价（元/度）</th>
          <th style="padding:12px 8px;text-align:left;border-bottom:1px solid #ebeef5">水费单价（元/吨）</th>
          <th style="padding:12px 8px;text-align:left;border-bottom:1px solid #ebeef5">出租状态</th>
          <th style="padding:12px 8px;text-align:left;border-bottom:1px solid #ebeef5">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr style="height:52px"><td class="cell-room" style="padding:6px 0">201</td><td class="cell-value" style="padding:6px 0">1200.00</td><td class="cell-value" style="padding:6px 0">1.00</td><td class="cell-value" style="padding:6px 0">5.00</td><td style="padding:6px 0"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;background:#f0f9eb;color:#67c23a;font-size:12px;font-weight:600">已租</span></td><td style="padding:6px 0"><span style="font-size:13px;color:#409eff;cursor:pointer">编辑</span></td></tr>
        <tr style="height:52px;background:#fafafa"><td class="cell-room" style="padding:6px 0">202</td><td class="cell-value" style="padding:6px 0">1300.00</td><td class="cell-value" style="padding:6px 0">1.00</td><td class="cell-value" style="padding:6px 0">5.00</td><td style="padding:6px 0"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;background:#f0f9eb;color:#67c23a;font-size:12px;font-weight:600">已租</span></td><td style="padding:6px 0"><span style="font-size:13px;color:#409eff;cursor:pointer">编辑</span></td></tr>
        <tr style="height:52px"><td class="cell-room" style="padding:6px 0">203</td><td class="cell-value" style="padding:6px 0">1100.00</td><td class="cell-value" style="padding:6px 0">1.00</td><td class="cell-value" style="padding:6px 0">5.00</td><td style="padding:6px 0"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;background:#fef0f0;color:#f56c6c;font-size:12px;font-weight:600">未租</span></td><td style="padding:6px 0"><span style="font-size:13px;color:#409eff;cursor:pointer">编辑</span></td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
