<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗夜金 · Dark Gold</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0a09;--bg-card:#1c1917;--bg-card-hover:#292524;--text:#fafaf9;--text-secondary:#a8a29e;--text-muted:#78716c;--border:#292524;--border-light:#3f3f46;--accent:#d97706;--accent-light:#fbbf24;--success:#65a30d;--danger:#dc2626;--font:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:0;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg);border-right:1px solid var(--border);padding:24px 16px;flex-shrink:0}
.sidebar h1{font-size:15px;font-weight:600;padding:0 12px 24px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;color:var(--text-secondary);cursor:pointer;transition:.15s;margin-bottom:2px}
.nav-item:hover{background:var(--bg-card);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500}
.nav-item.active svg{stroke:#fff}
.main{flex:1;padding:28px 36px;overflow-y:auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
header h2{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:#fafaf9}
.header-time{font-size:13px;color:var(--text-muted)}
.header-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;background:var(--accent);color:#0c0a09;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.header-btn:hover{background:var(--accent-light)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:.2s}
.kpi-card:hover{background:var(--bg-card-hover);border-color:var(--border-light)}
.kpi-label{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.kpi-unit{font-size:13px;font-weight:500;color:var(--text-muted);margin-left:4px}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:6px}
.kpi-accent .kpi-value{color:var(--accent-light)}
.kpi-success .kpi-value{color:var(--success)}
.kpi-warning .kpi-value{color:var(--danger)}
.glow-line{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.glow-income{background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.glow-paid{background:linear-gradient(90deg,var(--success),#a3e635)}
.glow-unpaid{background:linear-gradient(90deg,var(--danger),#f87171)}
.glow-occ{background:linear-gradient(90deg,#6366f1,#818cf8)}
.chart-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:.2s}
.chart-card:hover{background:var(--bg-card-hover);border-color:var(--border-light)}
.chart-header{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.chart-body{display:flex;align-items:center;gap:0}
.chart-metric{flex:1;text-align:center}
.cm-label{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:4px}
.cm-value{font-size:20px;font-weight:700;color:var(--text)}
.cm-unit{font-size:12px;color:var(--text-muted);margin-left:2px}
.cm-money{color:var(--accent-light)}
.chart-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-red{background:rgba(220,38,38,.15);color:#fca5a5;border:1px solid rgba(220,38,38,.25)}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h1><svg width="18" height="18" viewBox="0 0 24 24" fill="var(--accent)"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>House</h1>
    <div class="nav-item active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>数据大屏</div>
    <div class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>房间管理</div>
    <div class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>月度账单</div>
    <div class="nav-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>历史账单</div>
  </div>
  <div class="main">
    <header>
      <h2>2026年06月 数据概览</h2>
      <div class="header-time">2026年6月10日</div>
    </header>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="glow-line glow-income"></div>
        <div class="kpi-label">当月总收入</div>
        <div class="kpi-value kpi-accent">0.00<span class="kpi-unit">元</span></div>
        <div class="kpi-sub">较上月 <span style="color:var(--text-muted)">—</span></div>
      </div>
      <div class="kpi-card">
        <div class="glow-line glow-paid"></div>
        <div class="kpi-label">已缴费</div>
        <div class="kpi-value kpi-success">0<span class="kpi-unit">/0间</span></div>
        <div class="kpi-sub" style="display:flex;align-items:center;gap:6px;margin-top:6px"><span style="width:50px;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><span style="display:block;width:0%;height:100%;background:var(--success);border-radius:2px"></span></span>0%</div>
      </div>
      <div class="kpi-card">
        <div class="glow-line glow-unpaid"></div>
        <div class="kpi-label">未缴费</div>
        <div class="kpi-value kpi-warning">0<span class="kpi-unit">间</span></div>
        <div class="kpi-sub"><span class="badge badge-red">待催收</span></div>
      </div>
      <div class="kpi-card">
        <div class="glow-line glow-occ"></div>
        <div class="kpi-label">出租率</div>
        <div class="kpi-value">0<span class="kpi-unit">%</span></div>
        <div class="kpi-sub" style="display:flex;align-items:center;gap:6px;margin-top:6px"><span style="width:50px;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><span style="display:block;width:0%;height:100%;background:var(--accent);border-radius:2px"></span></span>0/0间</div>
      </div>
    </div>
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-header"><span style="color:#d97706">⚡</span> 电费</div>
        <div class="chart-body">
          <div class="chart-metric"><div class="cm-label">用量</div><div class="cm-value">0.0<span class="cm-unit">度</span></div></div>
          <div class="chart-divider"></div>
          <div class="chart-metric"><div class="cm-label">收入</div><div class="cm-value cm-money">0.00<span class="cm-unit">元</span></div></div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><span style="color:#60a5fa">💧</span> 水费</div>
        <div class="chart-body">
          <div class="chart-metric"><div class="cm-label">用量</div><div class="cm-value">0.0<span class="cm-unit">吨</span></div></div>
          <div class="chart-divider"></div>
          <div class="chart-metric"><div class="cm-label">收入</div><div class="cm-value cm-money">0.00<span class="cm-unit">元</span></div></div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><span style="color:#65a30d">📋</span> 房租</div>
        <div class="chart-body">
          <div class="chart-metric"><div class="cm-label">房间数</div><div class="cm-value">0<span class="cm-unit">间</span></div></div>
          <div class="chart-divider"></div>
          <div class="chart-metric"><div class="cm-label">收入</div><div class="cm-value cm-money">0.00<span class="cm-unit">元</span></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
